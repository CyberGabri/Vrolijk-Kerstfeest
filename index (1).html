<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nieuwjaarskaart</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TELA DE ABERTURA -->
<div class="start-screen" id="start">
  <button class="start-btn" onclick="start()">🎁 Abrir Convite 🎁</button>
</div>

<!-- BANDEIRA -->
<div class="flag">
  <div class="red"></div>
  <div class="white"></div>
  <div class="blue"></div>
</div>

<!-- ÁRVORES -->
<div class="tree left">🎄</div>
<div class="tree right">🎄</div>

<!-- CARTÃO -->
<div class="card" id="card">

  <!-- FOTO -->
  <img src="/imagem/foto.jpg" class="foto" alt="Foto especial">

  <h1>✨ Gelukkig Nieuwjaar ✨</h1>

  <p class="msg">Moge dit nieuwe jaar jullie vrede en gezondheid brengen.</p>
  <p class="msg">Dat elke dag gevuld mag zijn met liefde en verbondenheid.</p>
  <p class="msg">Moge geluk, warmte en mooie herinneringen altijd aanwezig zijn.</p>
  <p class="msg">Een prachtig 2026 gewenst voor jullie beiden 💙</p>

  <div class="ass">
    Met liefde,<br>
    Gabriel
  </div>

</div>

<script src="main.js"></script>
</body>
</html>
